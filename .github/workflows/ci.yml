# contribution → package(3×2×5=30) → package 실패 보고 → test(3×2=6) → test 실패 보고 → CodeQL
name: CI

on:
  push:
    branches: [contribution]
  pull_request:
    branches: [contribution]

env:
  MAVEN_CLI_OPTS: -B -Dfile.encoding=UTF-8 -Duser.timezone=Asia/Seoul
  # CI에 외부/임베디드 스택이 없는 모듈 — 단위 테스트에서만 제외
  MAVEN_TEST_EXCLUDES: '!Persistence/org.egovframe.rte.psl.data.mongodb,!Persistence/org.egovframe.rte.psl.reactive.cassandra,!Persistence/org.egovframe.rte.psl.reactive.mongodb,!Persistence/org.egovframe.rte.psl.reactive.redis'

jobs:
  package:
    name: Package (${{ matrix.os }}, JDK ${{ matrix.java }}, ${{ matrix.distribution }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        java: ['17', '21']
        distribution: [zulu, temurin, liberica, corretto, semeru]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: ${{ matrix.distribution }}
          java-version: ${{ matrix.java }}
          cache: maven
          cache-dependency-path: '**/pom.xml'

      - run: mvn $MAVEN_CLI_OPTS -U -Dmaven.test.skip=true verify

  package-report:
    name: Package matrix report
    needs: package
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            let body = '';
            try {
              const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
                per_page: 100,
              });
              const pkg = jobs.filter(j => j.name.startsWith('Package ('));
              const failed = pkg.filter(j => j.conclusion === 'failure');
              const lines = [
                '## Package matrix 결과',
                '',
                `- 조합 수: ${pkg.length}`,
                `- 성공: ${pkg.filter(j => j.conclusion === 'success').length}`,
                `- 실패: ${failed.length}`,
                '',
              ];
              if (failed.length) {
                lines.push('### 실패한 조합');
                failed.forEach(j => lines.push(`- **${j.name}**`));
              } else {
                lines.push('실패한 조합 없음.');
              }
              body = lines.join('\n');
            } catch (e) {
              body = `## Package matrix 보고\n\n보고 생성 오류: ${e.message}`;
            }
            await core.summary.addRaw(body).write();
            fs.writeFileSync('package-matrix-report.md', body);
      - uses: actions/upload-artifact@v6
        with:
          name: package-matrix-report
          path: package-matrix-report.md

  test:
    name: Test (${{ matrix.os }}, JDK ${{ matrix.java }})
    needs: package-report
    if: always() && !cancelled()
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        java: ['17', '21']
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
          cache-dependency-path: '**/pom.xml'

      - run: mvn $MAVEN_CLI_OPTS test -pl "$MAVEN_TEST_EXCLUDES"

      - name: Surefire reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: surefire-${{ matrix.os }}-jdk${{ matrix.java }}
          path: '**/target/surefire-reports/'
          if-no-files-found: ignore

  test-report:
    name: Test matrix report
    needs: test
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            let body = '';
            try {
              const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
                per_page: 100,
              });
              const t = jobs.filter(j => j.name.startsWith('Test ('));
              const failed = t.filter(j => j.conclusion === 'failure');
              const lines = [
                '## Test matrix 결과',
                '',
                `- 조합 수: ${t.length}`,
                `- 성공: ${t.filter(j => j.conclusion === 'success').length}`,
                `- 실패: ${failed.length}`,
                '',
              ];
              if (failed.length) {
                lines.push('### 실패한 조합');
                failed.forEach(j => lines.push(`- **${j.name}**`));
              } else {
                lines.push('실패한 조합 없음.');
              }
              body = lines.join('\n');
            } catch (e) {
              body = `## Test matrix 보고\n\n보고 생성 오류: ${e.message}`;
            }
            await core.summary.addRaw(body).write();
            fs.writeFileSync('test-matrix-report.md', body);
      - uses: actions/upload-artifact@v6
        with:
          name: test-matrix-report
          path: test-matrix-report.md

  codeql:
    needs: test-report
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: '**/pom.xml'

      - uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin

      - run: mvn -B -Dmaven.test.skip=true compile

      - uses: github/codeql-action/analyze@v4
